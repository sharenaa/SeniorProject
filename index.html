<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bringing Light</title>

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f6f1e8;
color:#2b2b2b;
}

header{
padding:40px;
text-align:center;
background:#f4eadc;
border-bottom:1px solid #e6d7c6;
}

section{padding:40px 8%;}

#wall{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
margin-top:20px;
}

.note{
background:#fffdf7;
padding:14px;
border-radius:10px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
position:relative;
}

.time{
font-size:10px;
opacity:0.6;
margin-bottom:6px;
}

.tag{
font-size:11px;
opacity:0.6;
margin-top:8px;
}

button{
margin-top:8px;
padding:6px 10px;
border:none;
border-radius:8px;
background:#e7c9a9;
cursor:pointer;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:1px solid #e5d3bd;
background:#fff;
}
</style>
</head>

<body>

<header>
<h1>✨ Bringing Light</h1>
<p>Anonymous shared hope wall</p>
</header>

<section>
<h2>💌 Hope Wall</h2>

<select id="emotion">
<option value="hope">Hope</option>
<option value="love">Love</option>
<option value="pain">Pain</option>
<option value="gratitude">Gratitude</option>
<option value="recovery">Recovery</option>
<option value="fear">Fear</option>
</select>

<textarea id="hope" placeholder="Write your message..."></textarea>
<button onclick="addHope()">Post</button>

<div id="wall"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ================= SUPABASE SETUP ================= */
const supabaseUrl = "https://cfmgiwakfqkhblabztah.supabase.co";
const supabaseKey = "sb_publishable_K-LDd-jTOlpA6P8DwhGjSA_f42EDcv8";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* ================= ADD POST ================= */
async function addHope(){
await supabase.from("hopewall").insert({
text: document.getElementById("hope").value,
emotion: document.getElementById("emotion").value,
time: new Date().toLocaleString()
});

document.getElementById("hope").value = "";
loadWall();
}

/* ================= LOAD WALL ================= */
async function loadWall(){
let { data } = await supabase
.from("hopewall")
.select("*")
.order("time", { ascending: false });

document.getElementById("wall").innerHTML = data.map(x => `
<div class="note">
<div class="time">${x.time}</div>
${x.text}

<div class="tag">Anonymous</div>

<button onclick="deletePost('${x.id}')">Report / Delete</button>
</div>
`).join("");
}

/* ================= DELETE ================= */
async function deletePost(id){
if(confirm("Delete this post?")){
await supabase.from("hopewall").delete().eq("id", id);
loadWall();
}
}

/* initial load */
loadWall();
</script>

</body>
</html>
